<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#001220" />

    <!-- SEO primário -->
    <title>CQP — Centro de Qualificação Profissional | Macaé/RJ</title>
    <meta name="description" content="Cursos técnicos, profissionalizantes, NRs, graduações, idiomas e kids em Macaé/RJ. Modalidades EAD, Flex e Presencial. Matrículas abertas 2026." />
    <meta name="keywords"    content="cursos técnicos Macaé, qualificação profissional, NR, EAD, cursos profissionalizantes, CQP" />
    <link rel="canonical"   href="https://cqpmacae.com.br/" />

    <!-- Open Graph / WhatsApp preview -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://cqpmacae.com.br/" />
    <meta property="og:title"       content="CQP — Centro de Qualificação Profissional" />
    <meta property="og:description" content="+100 cursos técnicos, EAD e presenciais em Macaé/RJ. Mensalidades a partir de R$150." />
    <meta property="og:image"       content="/images/logo/CQP-cropped.png" />
    <meta property="og:locale"      content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="CQP — Centro de Qualificação Profissional" />
    <meta name="twitter:description" content="+100 cursos técnicos, EAD e presenciais em Macaé/RJ." />
    <meta name="twitter:image"       content="/images/logo/CQP-cropped.png" />

    <!--
      Favicon — stack de 3 camadas para cobertura total de browsers:
      1. .ico  → Chrome, Firefox, Edge, Safari (melhor suporte)
      2. .png  → fallback moderno (browsers que ignoram .ico)
      3. apple-touch-icon → iOS "Adicionar à tela inicial"
      O browser usa o PRIMEIRO formato que suporta (ordem importa).
    -->
    <link rel="icon" type="image/x-icon"  href="/images/logo/cropped-logo-up.ico" />
    <link rel="icon" type="image/png"     href="/images/logo/CQP-cropped.png" sizes="32x32" />
    <link rel="apple-touch-icon"          href="/images/logo/CQP-cropped.png" />

    <!-- Fontes: Fontshare CDN (Boska + Satoshi) -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=boska@400,500,700,900&f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
